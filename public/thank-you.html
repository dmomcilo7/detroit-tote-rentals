<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You | Detroit Tote Rentals</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
      }

      body {
        font-family: system-ui, -apple-system, sans-serif;
        color: #0f172a;
        background: #f8fafc;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      main {
        max-width: 520px;
        text-align: center;
      }

      .icon {
        font-size: 3.5rem;
        margin-bottom: 16px;
      }

      h1 {
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 12px;
      }

      p {
        color: #475569;
        font-size: 1.125rem;
        line-height: 1.6;
        margin-bottom: 24px;
      }

      a {
        display: inline-block;
        background: #ea580c;
        color: #fff;
        font-weight: 600;
        padding: 12px 28px;
        border-radius: 9999px;
        text-decoration: none;
      }

      a:hover {
        background: #c2410c;
      }

      a:focus-visible {
        outline: 3px solid #f97316;
        outline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="icon" aria-hidden="true">✅</p>
      <h1>Thank you!</h1>
      <p>Your quote request has been received. We'll follow up soon.</p>
      <a href="/">Back to Home</a>
    </main>
  </body>
</html>
